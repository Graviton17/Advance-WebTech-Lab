<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Details</title>
  </head>
  <body>
    <h1>Product Detail</h1>
    <p><strong>Name:</strong> {{ product.name|default:"Unnamed Product" }}</p>
    <p><strong>Price:</strong> {{ product.price|default:"N/A" }}</p>
    <p>
      <strong>Description:</strong> {{ product.description|default:"No
      description available." }}
    </p>

    <a href="{% url 'update_product' product.pk %}">Edit</a>
    <a href="{% url 'list_product' %}">Back to List</a>
  </body>
</html>
