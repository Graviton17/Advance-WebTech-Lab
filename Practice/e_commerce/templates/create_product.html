<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create / Update Product</title>
  </head>
  <body>
    <h1>{% if form.instance.pk %}Update{% else %}Create{% endif %} Product</h1>
    <form method="post">
      {% csrf_token %} {{ form.as_p }}
      <button type="submit">Save</button>
    </form>
    <br />
    <a href="{% url 'list_product' %}">Cancel and Back to List</a>
  </body>
</html>
