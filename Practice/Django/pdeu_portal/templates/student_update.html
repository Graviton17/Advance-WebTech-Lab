<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Update</title>
  </head>
  <body>
    <h1>Update Student</h1>
    <form method="POST">
      {% csrf_token %}
      <div>
        <label for="name">Name:</label>
        <input
          type="text"
          id="name"
          name="name"
          value="{{ student.name }}"
          required
        />
      </div>
      <div>
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          value="{{ student.email }}"
          required
        />
      </div>
      <div>
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          value="{{ student.password }}"
          required
        />
      </div>
      <button type="submit">Update</button>
    </form>
    <a href="/student/">Cancel</a>
  </body>
</html>
