<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Products</title>
  </head>
  <body>
    <h1>All Products</h1>
    <a href="{{ url_for('product.create_product') }}">Add New Product</a> |
    <a href="/">Go to Home</a>
    <hr />
    <ul>
      {% for product in products %}
      <li>
        <strong>{{ product.name }}</strong> (Category: {{ product.category }}) -
        ${{ product.price }} | Stock: {{ product.available_stock }}
        <a href="{{ url_for('product.get_product', id=product.id) }}">View</a> |
        <a href="{{ url_for('product.update_product', id=product.id) }}"
          >Edit</a
        >
        |
        <form
          action="{{ url_for('product.delete_product', id=product.id) }}"
          method="POST"
          style="display: inline"
        >
          <button
            type="submit"
            onclick="
              return confirm('Are you sure you want to delete this product?');
            "
          >
            Delete
          </button>
        </form>
      </li>
      {% endfor %}
    </ul>
  </body>
</html>
