<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Product</title>
  </head>
  <body>
    <h1>Create Product</h1>
    <form action="{{ url_for('product.create_product') }}" method="POST">
      <label>Name: <input type="text" name="name" required /></label
      ><br /><br />
      <label
        >Description: <textarea name="description" required></textarea></label
      ><br /><br />
      <label>Price: <input type="number" name="price" required /></label
      ><br /><br />
      <label>Category: <input type="text" name="category" required /></label
      ><br /><br />
      <label
        >Stock: <input type="number" name="available_stock" required /></label
      ><br /><br />
      <button type="submit">Create</button>
    </form>
    <br />
    <a href="{{ url_for('product.list_products') }}">Back to Products</a>
  </body>
</html>
