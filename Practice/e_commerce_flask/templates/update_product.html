<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Product</title>
  </head>
  <body>
    <h1>Edit Product: {{ product.name }}</h1>
    <form
      action="{{ url_for('product.update_product', id=product.id) }}"
      method="POST"
    >
      <label
        >Name:
        <input
          type="text"
          name="name"
          value="{{ product.name }}"
          required /></label
      ><br /><br />
      <label
        >Description:
        <textarea name="description" required>
{{ product.description }}</textarea
        ></label
      ><br /><br />
      <label
        >Price:
        <input
          type="number"
          name="price"
          value="{{ product.price }}"
          required /></label
      ><br /><br />
      <label
        >Category:
        <input
          type="text"
          name="category"
          value="{{ product.category }}"
          required /></label
      ><br /><br />
      <label
        >Stock:
        <input
          type="number"
          name="available_stock"
          value="{{ product.available_stock }}"
          required /></label
      ><br /><br />
      <button type="submit">Update</button>
    </form>
    <br />
    <a href="{{ url_for('product.list_products') }}">Back to Products</a>
  </body>
</html>
