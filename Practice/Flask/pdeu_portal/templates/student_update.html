<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Update Page</title>
  </head>
  <body>
    <div
      style="
        max-width: 640px;
        margin: 2rem auto;
        font-family: Arial, sans-serif;
      "
    >
      <h1 style="margin-bottom: 1rem">Update Student</h1>

      <form
        method="POST"
        action="{{ url_for('student.update', id=student.id) }}"
        style="display: grid; gap: 0.75rem"
      >
        <label>
          Name
          <input
            type="text"
            name="name"
            value="{{ student.name }}"
            style="width: 100%; padding: 0.5rem"
          />
        </label>

        <label>
          Email
          <input
            type="email"
            name="email"
            value="{{ student.email }}"
            style="width: 100%; padding: 0.5rem"
          />
        </label>

        <label>
          Password
          <input
            type="password"
            name="password"
            style="width: 100%; padding: 0.5rem"
          />
        </label>

        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem">
          <button type="submit" style="padding: 0.6rem 1rem; cursor: pointer">
            Update
          </button>
          <a
            href="{{ url_for('student.display') }}"
            style="
              padding: 0.6rem 1rem;
              text-decoration: none;
              border: 1px solid #999;
            "
            >Cancel</a
          >
        </div>
      </form>
    </div>
  </body>
</html>
