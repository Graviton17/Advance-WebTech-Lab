<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login Page</title>
</head>
<body>
  <div style="max-width: 400px; margin: 80px auto; font-family: Arial, sans-serif;">
    <h2 style="text-align: center;">Student Login</h2>

    <form action="{{ url_for('auth.login') }}" method="post" style="display: grid; gap: 12px;">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="Enter your email"
             style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="Enter your password"
             style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;">

      <button type="submit">
        Login
      </button>
    </form>

    <p style="text-align: center; margin-top: 14px;">
      New student? <a href="{{ url_for('auth.register') }}">Create an account</a>
    </p>
  </div>
</body>
</html>
