<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Display Page</title>
</head>
<body>
  <h2 style="text-align: center;">Student Display Page</h2>
  <div style="max-width: 600px; margin: 0 auto; font-family: Arial, sans-serif;">
    <ul>
      {% for student in students %}
        <li>
          <strong>{{ student.name }}</strong> - {{ student.email }}

          <a href="{{ url_for('student.profile', id=student.id) }}">View Profile</a>

          <a href="{{ url_for('student.delete', id=student.id) }}" style="color: red; margin-left: 10px;">Delete</a>

          <a href="{{ url_for('student.update', id=student.id) }}" style="color: blue; margin-left: 10px;">Update</a>
        </li>
      {% endfor %}
    </ul>
  </div>
</body>
</html>
