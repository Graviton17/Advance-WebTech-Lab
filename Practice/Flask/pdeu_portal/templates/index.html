<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDEU Student Portal</title>
</head>
<body>
  {# This is the main template for the PDEU Student Portal. It includes a header, a navigation bar, and a content area where different pages will be rendered. #}

  {% if username %}
    <p>Welcome, {{ username }}!</p>

    <h1>PDEU Student Portal</h1>
    <a href="{{ url_for('student.greeting') }}">
      <button>Click Here</button>
    </a>
  {% else %}
    <p>Please log in to access the student portal.</p>
  {% endif %}
</body>
</html>
