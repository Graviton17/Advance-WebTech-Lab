{% extends 'base.html' %}

{% block content %}
<div class="row mb-3">
    <div class="col-md-9">
        <h2>Students List</h2>
    </div>
    <div class="col-md-3 text-end">
        <a href="{% url 'add_student' %}" class="btn btn-primary">Add Student</a>
    </div>
</div>

<table class="table table-bordered">
    <thead class="table-light">
        <tr>
            <th>Name</th>
            <th>Roll Number</th>
            <th>Email</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.roll_number }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.course }}</td>
            <td>
                <a href="{% url 'edit_student' student.pk %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'delete_student' student.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" class="text-center">No students found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
